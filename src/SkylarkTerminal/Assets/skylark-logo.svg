<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E8845A"/>
      <stop offset="100%" stop-color="#D4603A"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="56" fill="url(#brand)"/>
  <g transform="translate(116,136)">
